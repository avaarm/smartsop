name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Build & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit -p tsconfig.app.json
      - run: npm run build

  backend:
    name: Backend Lint & Template Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-gmp.txt
      - run: pip install -r requirements-gmp.txt
      - name: Validate all templates load
        run: |
          python -c "
          from ml_model.gmp.template_loader import TemplateLoader
          loader = TemplateLoader()
          templates = loader.list_templates()
          assert len(templates) >= 8, f'Expected >= 8 templates, got {len(templates)}'
          for t in templates:
              tpl = loader.load_template(t['id'])
              print(f'OK  {t[\"id\"]}  ({len(tpl.sections)} sections)')
          print(f'All {len(templates)} templates validated.')
          "
      - name: Smoke-test DOCX generation
        run: |
          python -c "
          from ml_model.gmp.document_generator import GMPDocumentGenerator
          gen = GMPDocumentGenerator()
          for tid in ['batch_record', 'sop', 'validation_protocol', 'deviation_form']:
              result = gen.generate_document(tid, {
                  'title': f'CI Test {tid}',
                  'product_name': 'Test',
                  'process_type': 'Test',
                  'description': 'CI smoke test',
              })
              assert result['filename'].endswith('.docx')
              print(f'OK  {tid} -> {result[\"filename\"]}')
          "

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f Dockerfile.backend -t smartsop-backend .
      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t smartsop-frontend .
