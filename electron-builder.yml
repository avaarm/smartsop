appId: io.smartsop.desktop
productName: SmartSOP
copyright: Copyright (c) 2024-2026 SmartSOP

directories:
  output: release
  buildResources: electron/build-resources

files:
  - electron/**/*
  - "!electron/build-resources"
  - "!**/*.map"

extraResources:
  # Bundled Angular static files
  - from: dist/smartsop/browser
    to: frontend
    filter:
      - "**/*"
  # Bundled PyInstaller backend
  - from: dist-backend/
    to: backend
    filter:
      - "**/*"

mac:
  category: public.app-category.productivity
  icon: electron/build-resources/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: electron/build-resources/entitlements.mac.plist
  entitlementsInherit: electron/build-resources/entitlements.mac.plist

dmg:
  title: SmartSOP
  # Explicitly disable the background image — dmg-builder otherwise tries to
  # stat a missing background.tiff in CI runners and fails.
  background: null
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  icon: electron/build-resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  installerIcon: electron/build-resources/icon.ico
  installerHeaderIcon: electron/build-resources/icon.ico
  license: LICENSE

linux:
  icon: electron/build-resources/icon.png
  category: Science
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  desktop:
    StartupWMClass: SmartSOP

publish: null
